name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run compile
      - run: npx @vscode/vsce package
      - uses: actions/upload-artifact@v4
        with:
          name: json-chat-viewer-vsix
          path: "*.vsix"
          if-no-files-found: error

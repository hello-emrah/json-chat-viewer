name: Release

# Publish on every version tag:
#   npm version patch   # bumps package.json + creates the tag
#   git push --follow-tags
#
# Always: builds the .vsix and attaches it to a GitHub Release.
# If the matching repo secret is set, also publishes to:
#   - VS Code Marketplace   (secret: VSCE_PAT)   -> reaches VS Code
#   - Open VSX              (secret: OVSX_PAT)   -> reaches Cursor / Windsurf / VSCodium
# Until those secrets exist, the marketplace steps are skipped, so the
# GitHub release still works on its own.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx @vscode/vsce package
      - name: Publish GitHub release (.vsix attached)
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"
          generate_release_notes: true
      - name: Publish to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: npx @vscode/vsce publish --packagePath *.vsix -p "$VSCE_PAT"
      - name: Publish to Open VSX
        if: ${{ env.OVSX_PAT != '' }}
        run: npx ovsx publish *.vsix -p "$OVSX_PAT"
